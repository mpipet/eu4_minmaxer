# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.minmaxer.eu;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - API reverse proxy
server {
    listen 443 ssl;
	http2 on;
    server_name api.minmaxer.eu;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.minmaxer.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.minmaxer.eu/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limiting
    limit_req zone=api_limit burst=300 nodelay;

    # Reverse proxy vers Flask
    location / {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://api:5000/health;
        access_log off;
    }
}